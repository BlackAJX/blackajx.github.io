<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230a1628' width='192' height='192'/><text x='50%' y='50%' font-size='100' fill='%2300d4ff' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>A</text></svg>">
<title>AnimaPad</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a1628;--surface:rgba(30,50,90,0.4);--surface2:rgba(20,35,70,0.6);--text:#e8f0ff;--text2:rgba(232,240,255,0.6);--text3:rgba(232,240,255,0.35);--neon-pink:#ff3b9a;--neon-cyan:#00d4ff;--neon-purple:#d946ef;--neon-green:#00ff88;}
html,body{height:100%;background:var(--bg);}
body{font-family:'Outfit',sans-serif;color:var(--text);overflow-x:hidden;background:radial-gradient(ellipse 100% 80% at 50% 0%,rgba(99,102,241,0.15) 0%,transparent 50%),radial-gradient(ellipse 100% 100% at 0% 100%,rgba(168,85,247,0.1) 0%,transparent 50%);}
.hdr{position:sticky;top:0;z-index:60;padding:18px 20px 12px;background:rgba(10,22,40,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,212,255,0.1);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.logo{font-size:24px;font-weight:600;letter-spacing:-0.5px;}
.logo span{background:linear-gradient(135deg,#d946ef 0%,#6366f1 50%,#00d4ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-acts{display:flex;gap:8px;}
.hbtn{width:36px;height:36px;border-radius:12px;background:var(--surface);border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:16px;transition:all .2s;}
.hbtn:hover{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,212,255,0.1);}
.hbtn:active{transform:scale(0.92);}
.srch{position:relative;margin-bottom:8px;}
.srch input{width:100%;background:var(--surface);border:1px solid rgba(0,212,255,0.15);border-radius:12px;padding:10px 14px 10px 36px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.srch input:focus{border-color:var(--neon-cyan);}
.srch input::placeholder{color:var(--text3);}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none;}
.frow{display:flex;gap:7px;padding:10px 20px 6px;overflow-x:auto;scrollbar-width:none;}
.frow::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid rgba(232,240,255,0.15);font-size:12px;font-weight:500;background:var(--surface);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;}
.chip:hover{border-color:rgba(0,212,255,0.4);color:var(--neon-cyan);}
.chip.on{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,212,255,0.12);box-shadow:0 0 12px rgba(0,212,255,0.3);}
.page{display:none;position:relative;z-index:1;}
.page.on{display:block;}
.nlist{padding:12px 16px 100px;display:flex;flex-direction:column;gap:12px;}
.nc{position:relative;border-radius:16px;overflow:hidden;background:var(--surface2);backdrop-filter:blur(20px);border:2px solid rgba(0,212,255,0.25);transition:all .2s;touch-action:pan-y;user-select:none;}
.nc::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse 600px 200px at 50% -100px,rgba(0,212,255,0.1),transparent 60%);pointer-events:none;}
.nc-inner{position:relative;z-index:1;padding:14px 16px 12px;}
.nc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;}
.nc-drag{color:var(--text3);font-size:15px;flex-shrink:0;cursor:grab;touch-action:none;padding-top:2px;transition:color .2s;}
.nc-drag:active{color:var(--neon-cyan);}
.nc-main{flex:1;min-width:0;}
.nc-title{font-size:16px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.nc-date{font-size:11px;color:var(--text2);}
.nc-tag{font-size:10px;font-weight:500;padding:3px 9px;border-radius:18px;background:rgba(0,212,255,0.1);color:var(--neon-cyan);border:1px solid rgba(0,212,255,0.3);}
.nc-ctx{font-size:20px;color:var(--text3);cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;transition:color .2s;}
.nc-ctx:active{color:var(--neon-cyan);}
.nc-items{padding:8px 0 6px 20px;display:flex;flex-direction:column;gap:5px;}
.ni{display:flex;align-items:flex-start;gap:9px;font-size:14px;line-height:1.5;}
.ni-chk{width:16px;height:16px;border-radius:4px;flex-shrink:0;margin-top:3px;border:1.5px solid rgba(0,212,255,0.3);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.ni-chk:hover{border-color:var(--neon-cyan);}
.ni-chk.ck{background:linear-gradient(135deg,#00ff88,rgba(0,255,136,0.7));border-color:transparent;box-shadow:0 0 12px rgba(0,255,136,0.4);}
.ni-chk.ck::after{content:'✓';font-size:11px;color:#000;font-weight:600;}
.ni-txt{flex:1;color:var(--text);}
.ni-txt.dn{color:var(--text3);text-decoration:line-through;}
.ni-badges{display:flex;gap:4px;align-items:center;flex-shrink:0;margin-top:2px;}
.ni-b{font-size:9px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);padding:2px 7px;border-radius:20px;cursor:pointer;color:var(--neon-cyan);transition:all .15s;}
.ni-b:hover{background:rgba(0,212,255,0.15);border-color:var(--neon-cyan);}
.nc-addbtn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:4px 0 2px 20px;transition:color .2s;margin-top:2px;}
.nc-addbtn:hover{color:var(--neon-cyan);}
.nc-rem{display:flex;align-items:center;gap:5px;padding:0 0 4px 20px;font-size:10px;color:rgba(255,153,0,0.8);}
.cw{padding:12px 16px 100px;position:relative;z-index:1;}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 4px 14px;}
.cm{font-size:20px;font-weight:500;}
.cnb{width:36px;height:36px;background:var(--surface);border:1px solid rgba(0,212,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:18px;transition:all .2s;}
.cnb:hover{border-color:var(--neon-cyan);color:var(--neon-cyan);}
.cg{background:var(--surface2);backdrop-filter:blur(20px);border:1px solid rgba(0,212,255,0.15);border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 0 20px rgba(0,212,255,0.1);}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(0,212,255,0.1);}
.cdow div{text-align:center;padding:12px 0 10px;font-size:11px;font-weight:500;color:var(--text3);}
.cdays{display:grid;grid-template-columns:repeat(7,1fr);}
.cday{min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .15s;}
.cday:hover{background:rgba(0,212,255,0.08);}
.cdn{font-size:13px;font-weight:400;}
.cday.empty .cdn{color:transparent;}
.cday.today .cdn{background:linear-gradient(135deg,#d946ef,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600;}
.cday.sel{background:rgba(0,212,255,0.12);}
.cdots{display:flex;gap:2px;justify-content:center;min-height:5px;}
.cdot{width:3px;height:3px;border-radius:50%;}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(10,22,40,0.85);backdrop-filter:blur(20px);border-top:1px solid rgba(0,212,255,0.1);display:flex;align-items:center;padding:8px 0 env(safe-area-inset-bottom,10px);}
.bi{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--text3);transition:color .2s;}
.bi:hover{color:var(--neon-cyan);}
.bi.on{color:var(--neon-cyan);}
.bio{font-size:18px;line-height:1;}
.bil{font-size:9px;font-weight:500;}
.fab-wrap{flex:1;display:flex;justify-content:center;}
.fab{width:50px;height:50px;background:linear-gradient(135deg,#ff6b6b 0%,#ff3b9a 50%,#a855f7 100%);border:1px solid rgba(255,59,154,0.5);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;cursor:pointer;box-shadow:0 0 20px rgba(255,59,154,0.4);transition:all .2s;}
.fab:hover{box-shadow:0 0 30px rgba(255,59,154,0.6);}
.fab:active{transform:scale(0.92);}
.mo{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.mo.on{opacity:1;pointer-events:all;}
.md{width:100%;background:rgba(10,22,40,0.95);backdrop-filter:blur(24px);border-top:2px solid;border-image:linear-gradient(135deg,#d946ef 0%,#6366f1 50%,#00d4ff 100%) 1;border-top-left-radius:24px;border-top-right-radius:24px;padding:0 0 env(safe-area-inset-bottom,16px);transform:translateY(100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);max-height:92dvh;overflow-y:auto;}
.mo.on .md{transform:translateY(0);}
.mh{width:36px;height:3px;background:rgba(0,212,255,0.2);border-radius:2px;margin:12px auto 16px;}
.mt{font-size:18px;font-weight:600;padding:0 20px 14px;border-bottom:1px solid rgba(0,212,255,0.1);margin-bottom:14px;}
.fr{padding:8px 20px;}
.fl{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px;letter-spacing:0.05em;}
.fi{width:100%;background:var(--surface);border:1.5px solid rgba(0,212,255,0.2);border-radius:12px;padding:10px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--neon-cyan);}
.fi::placeholder{color:var(--text3);}
.sw{display:flex;gap:8px;padding:6px 0;flex-wrap:wrap;}
.swc{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:0 0 12px rgba(0,0,0,0.4);}
.swc.on{border-color:rgba(232,240,255,0.5);transform:scale(1.15);}
.pr{display:flex;gap:6px;}
.pb{flex:1;padding:9px 4px;border-radius:11px;border:1px solid rgba(0,212,255,0.2);background:var(--surface);color:var(--text2);font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
.pb.sh{background:rgba(255,59,154,0.12);border-color:rgba(255,59,154,0.3);color:#ff3b9a;}
.pb.sm{background:rgba(255,153,0,0.12);border-color:rgba(255,153,0,0.3);color:#ff9900;}
.pb.sl{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.3);color:#00ff88;}
.ma{display:flex;gap:8px;padding:16px 20px 8px;}
.btn-cancel{flex:1;padding:11px;background:var(--surface);border:1px solid rgba(0,212,255,0.2);border-radius:11px;color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--neon-cyan);color:var(--neon-cyan);}
.btn-save{flex:2;padding:11px;background:linear-gradient(135deg,#ff6b6b 0%,#ff3b9a 50%,#a855f7 100%);border:1px solid rgba(255,59,154,0.4);border-radius:11px;color:white;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:0.02em;box-shadow:0 0 20px rgba(255,59,154,0.3);}
.btn-save:hover{box-shadow:0 0 30px rgba(255,59,154,0.5);}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:8px 16px;}
.ath{aspect-ratio:1;border-radius:11px;background:var(--surface);border:1px solid rgba(0,212,255,0.2);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.ath img{width:100%;height:100%;object-fit:cover;}
.ath .rm{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--neon-cyan);cursor:pointer;}
.aa{margin:8px 16px;padding:16px;border:1px dashed rgba(0,212,255,0.2);border-radius:12px;text-align:center;color:var(--text2);font-size:13px;cursor:pointer;background:rgba(0,212,255,0.05);transition:all .15s;}
.aa:hover{border-color:var(--neon-cyan);color:var(--neon-cyan);background:rgba(0,212,255,0.1);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(10,22,40,0.92);backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,0.3);border-radius:11px;padding:10px 18px;font-size:13px;color:var(--text);z-index:300;opacity:0;transition:all .25s;white-space:nowrap;box-shadow:0 0 12px rgba(0,212,255,0.2);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
.cnt{position:fixed;top:120px;right:16px;z-index:40;background:var(--surface);border:1px solid rgba(0,212,255,0.2);border-radius:18px;padding:4px 10px;font-size:10px;color:var(--text3);}
.empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:70px 20px;color:var(--text3);text-align:center;}
.empty-i{font-size:48px;opacity:.2;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo">Anima<span>Pad</span></div>
    <div class="hdr-acts">
      <div class="hbtn" onclick="openTagMgr()">🏷</div>
      <div class="hbtn" onclick="shareAll()">↑</div>
    </div>
  </div>
  <div class="srch">
    <span class="srch-ico">⌕</span>
    <input id="sInput" placeholder="Search notes…" oninput="renderNotes()">
  </div>
</div>

<div class="frow" id="filterRow"></div>
<div class="cnt" id="cnt"></div>

<div class="page on" id="pageNotes"><div class="nlist" id="notesList"></div></div>
<div class="page" id="pageCal"><div class="cw"><div class="ch"><div class="cnb" onclick="calNav(-1)">‹</div><div class="cm" id="calMth"></div><div class="cnb" onclick="calNav(1)">›</div></div><div class="cg"><div class="cdow" id="calDow"></div><div class="cdays" id="calDays"></div></div><div id="calNotes"></div></div></div>

<div class="bn">
  <div class="bi on" id="bnN" onclick="switchPage('notes')"><div class="bio">◈</div><div class="bil">Notes</div></div>
  <div class="fab-wrap"><div class="fab" onclick="openNewNote()">＋</div></div>
  <div class="bi" id="bnC" onclick="switchPage('cal')"><div class="bio">◫</div><div class="bil">Calendar</div></div>
</div>

<div class="mo" id="noteModal" onclick="closeMO(event,'noteModal')">
  <div class="md">
    <div class="mh"></div>
    <div class="mt" id="mTitle">New Note</div>
    <div class="fr"><div class="fl">Title</div><input class="fi" id="nTitle" placeholder="Meeting, event…" maxlength="60"></div>
    <div class="fr"><div class="fl">Title Color</div><div class="sw" id="titleColors"></div></div>
    <div class="fr"><div class="fl">Tag</div><select class="fi" id="nTag" style="appearance:none"></select></div>
    <div class="fr"><div class="fl">Priority</div><div class="pr"><button class="pb" data-p="high" onclick="selP('high')">High</button><button class="pb sm" data-p="mid" onclick="selP('mid')">Mid</button><button class="pb" data-p="low" onclick="selP('low')">Low</button></div></div>
    <div class="ma"><button class="btn-cancel" onclick="closeNoteModal()">Cancel</button><button class="btn-save" onclick="saveNote()">Save</button></div>
  </div>
</div>

<div class="mo" id="detailModal" onclick="closeMO(event,'detailModal')">
  <div class="md">
    <div class="mh"></div>
    <div class="mt">Item Detail</div>
    <div class="fr"><div class="fl">Content</div><input class="fi" id="dTxt" placeholder="Item text…"></div>
    <div class="fr"><div class="fl">Text Color</div><div class="sw" id="itemColors"></div></div>
    <div style="padding:4px 20px;font-size:10px;color:var(--text3);margin-top:4px;">IMAGES</div>
    <div class="ag" id="attachGrid"></div>
    <div class="aa" onclick="document.getElementById('fileInput').click()">+ Add photo or image</div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(event)">
    <div class="ma"><button class="btn-cancel" onclick="closeDetailModal()">Cancel</button><button class="btn-save" onclick="saveDetail()">Save</button></div>
  </div>
</div>

<div class="mo" id="imgModal" onclick="closeMO(event,'imgModal')">
  <div class="md" style="max-width:100%;width:100%;">
    <div class="mh"></div>
    <img id="imgPreview" style="width:100%;height:auto;border-radius:12px;margin:20px;">
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS=['#e8f0ff','#00d4ff','#00ff88','#ff3b9a','#d946ef','#ff9900'];
const DEF_TAGS=[{id:'meeting',name:'Meeting',color:'#ff3b9a'},{id:'todo',name:'To-do',color:'#00ff88'},{id:'project',name:'Project',color:'#00d4ff'},{id:'other',name:'Other',color:'#d946ef'}];
let notes=[],tags=[],curF='all',curP='mid',editId=null,ctxId=null;
let dNoteId=null,dIdx=null,dAttach=[],dIC='#e8f0ff',iRemOn=false;
let calY,calM;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function now(){return new Date().toLocaleDateString('zh-TW',{month:'2-digit',day:'2-digit'})+' '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});}
function dk(d){const x=d||new Date();return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}

function load(){
  try{notes=JSON.parse(localStorage.getItem('ap5')||'[]');}catch{notes=[];}
  try{tags=JSON.parse(localStorage.getItem('ap5t')||'null')||DEF_TAGS.map(t=>({...t}));}catch{tags=DEF_TAGS.map(t=>({...t}));}
  if(!notes.length){
    notes=[
      {id:uid(),title:'Q3 Product Planning',titleColor:'#e8f0ff',tag:'meeting',priority:'high',date:'05/27 14:30',dateKey:'2026-05-27',items:[{text:'Confirm Q3 OKRs',color:'#e8f0ff',done:true,attachments:[]},{text:'Feature priority ranking',color:'#e8f0ff',done:true,attachments:[]},{text:'Competitive analysis',color:'#00d4ff',done:false,attachments:[]},{text:'Update roadmap doc',color:'#e8f0ff',done:false,attachments:[]}]},
      {id:uid(),title:'Weekly To-do',titleColor:'#e8f0ff',tag:'todo',priority:'mid',date:'05/27',dateKey:'2026-05-27',items:[{text:'Reply client email',color:'#e8f0ff',done:true,attachments:[]},{text:'Weekly report',color:'#00ff88',done:false,attachments:[]},{text:'Schedule 1:1 meeting',color:'#e8f0ff',done:false,attachments:[]}]}
    ];sv();
  }
}
function sv(){localStorage.setItem('ap5',JSON.stringify(notes));localStorage.setItem('ap5t',JSON.stringify(tags));}

function tagBy(id){return tags.find(t=>t.id===id)||{id:'other',name:'Other',color:'#00d4ff'};}
function renderFR(){document.getElementById('filterRow').innerHTML=[{id:'all',name:'All',color:''},...tags].map(t=>`<div class="chip${curF===t.id?' on':''}" onclick="setF('${t.id}')">${t.id==='all'?'All':`<span style="width:6px;height:6px;border-radius:50%;background:${t.color};display:inline-block;margin-right:6px;vertical-align:middle"></span>${t.name}`}</div>`).join('');}
function renderTS(){document.getElementById('nTag').innerHTML=tags.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');}
function mkSw(cid,cur,cb){const el=document.getElementById(cid);el.innerHTML=COLORS.map(c=>`<div class="swc${c===cur?' on':''}" style="background:${c}" onclick="pickSw('${cid}','${c}')"></div>`).join('');el._cb=cb;}
function pickSw(cid,c){const el=document.getElementById(cid);el.querySelectorAll('.swc').forEach(s=>s.classList.toggle('on',s.style.background===c));if(el._cb)el._cb(c);}

function setF(f){curF=f;renderFR();renderNotes();}
function switchPage(p){['notes','cal'].forEach(x=>{document.getElementById('page'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('on',x===p);document.getElementById('bn'+x.charAt(0).toUpperCase()).classList.toggle('on',x===p);});document.getElementById('filterRow').style.display=p==='notes'?'':'none';document.getElementById('cnt').style.display=p==='notes'?'':'none';if(p==='cal')renderCal();}

function renderNotes(){
  const q=(document.getElementById('sInput').value||'').toLowerCase();
  const list=notes.filter(n=>(curF==='all'||n.tag===curF)&&(!q||(n.title.toLowerCase().includes(q)||n.items.some(i=>i.text.toLowerCase().includes(q)))));
  document.getElementById('cnt').textContent=list.length;
  const el=document.getElementById('notesList');
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-i">◈</div><p>${q?'No results found':'No notes yet'}</p></div>`;return;}
  el.innerHTML=list.map(n=>{const items=n.items.map((it,i)=>{const ac=(it.attachments||[]).length;return `<div class="ni"><div class="ni-chk${it.done?' ck':''}" onclick="toggle('${n.id}',${i})"></div><span class="ni-txt${it.done?' dn':''}" style="color:${it.done?'var(--text3)':it.color||'var(--text)'}">${it.text}</span><div class="ni-badges">${ac?`<span class="ni-b has" onclick="openDetail('${n.id}',${i})">📎${ac}</span>`:''}${!ac?`<span class="ni-b" style="color:#ff3b9a;background:rgba(255,59,154,0.1);border-color:rgba(255,59,154,0.3);cursor:pointer" onclick="delItem('${n.id}',${i})">✕</span>`:''}</div></div>`;}).join('');return `<div class="nc"><div class="nc-inner"><div class="nc-head"><div class="nc-drag">⠿</div><div class="nc-main"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:8px;font-weight:600;padding:2px 7px;border-radius:16px;background:${n.priority==='high'?'rgba(255,59,154,0.12)':n.priority==='low'?'rgba(0,255,136,0.12)':'rgba(255,153,0,0.12)'};color:${n.priority==='high'?'#ff3b9a':n.priority==='low'?'#00ff88':'#ff9900'}">${n.priority.toUpperCase()}</span></div><div class="nc-title" style="color:${n.titleColor||'var(--text)'}">${n.title}</div><div class="nc-meta"><span class="nc-date">${n.date}</span><span class="nc-tag" style="background:${tagBy(n.tag).color}15;color:${tagBy(n.tag).color}">${tagBy(n.tag).name}</span></div></div><div class="nc-ctx" onclick="openCtx(event,'${n.id}')">···</div></div><div class="nc-items">${items}</div><button class="nc-addbtn" onclick="addItem('${n.id}')">+ Add item</button></div></div>`;}).join('');}

function toggle(nid,i){const n=notes.find(x=>x.id===nid);if(!n)return;n.items[i].done=!n.items[i].done;sv();renderNotes();}
function delItem(nid,i){if(!confirm('Delete this item?'))return;const n=notes.find(x=>x.id===nid);if(!n)return;n.items.splice(i,1);sv();renderNotes();}
function addItem(nid){const t=prompt('New item:');if(!t||!t.trim())return;const n=notes.find(x=>x.id===nid);if(!n)return;n.items.push({text:t.trim(),color:'#e8f0ff',done:false,attachments:[]});sv();renderNotes();}

function openCtx(e,nid){e.stopPropagation();ctxId=nid;showToast('Long press item for more options');}
function openNewNote(){editId=null;curP='mid';document.getElementById('mTitle').textContent='New Note';document.getElementById('nTitle').value='';renderTS();selP('mid');mkSw('titleColors','#e8f0ff',c=>{});document.getElementById('noteModal').classList.add('on');setTimeout(()=>document.getElementById('nTitle').focus(),300);}
function openEdit(n){editId=n.id;document.getElementById('mTitle').textContent='Edit Note';document.getElementById('nTitle').value=n.title;renderTS();document.getElementById('nTag').value=n.tag;selP(n.priority);mkSw('titleColors',n.titleColor||'#e8f0ff',c=>{});document.getElementById('noteModal').classList.add('on');}
function closeNoteModal(){document.getElementById('noteModal').classList.remove('on');}
function closeMO(e,id){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('on');}
function selP(p){curP=p;document.querySelectorAll('.pb').forEach(b=>{b.className='pb';if(b.dataset.p===p)b.classList.add('s'+p[0]);});}
function saveNote(){const title=document.getElementById('nTitle').value.trim();if(!title){document.getElementById('nTitle').focus();return;}const tag=document.getElementById('nTag').value;if(editId){const n=notes.find(x=>x.id===editId);if(n){n.title=title;n.tag=tag;n.priority=curP;}}else notes.unshift({id:uid(),title,titleColor:'#e8f0ff',tag,priority:curP,date:now(),dateKey:dk(),items:[]});sv();renderNotes();closeNoteModal();}
function shareAll(){const t=notes.map(n=>`${n.title}\n${n.items.map(i=>(i.done?'✓ ':'○ ')+i.text).join('\n')}`).join('\n\n');navigator.clipboard.writeText(t).then(()=>showToast('Copied to clipboard'));}
function openTagMgr(){showToast('Tag management - coming soon');}

function initCal(){const n=new Date();calY=n.getFullYear();calM=n.getMonth();}
function calNav(d){calM+=d;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}renderCal();}
function renderCal(){const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];document.getElementById('calMth').textContent=mn[calM]+' '+calY;document.getElementById('calDow').innerHTML=['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div>${d}</div>`).join('');const first=new Date(calY,calM,1).getDay(),days=new Date(calY,calM+1,0).getDate(),todayK=dk();let html='';for(let i=0;i<first;i++)html+=`<div class="cday empty"><div class="cdn"></div></div>`;for(let d=1;d<=days;d++){const k=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');html+=`<div class="cday${k===todayK?' today':''}"><div class="cdn">${d}</div></div>`;}document.getElementById('calDays').innerHTML=html;}

function openDetail(nid,i){dNoteId=nid;dIdx=i;const n=notes.find(x=>x.id===nid);const it=n.items[i];dAttach=JSON.parse(JSON.stringify(it.attachments||[]));dIC=it.color||'#e8f0ff';document.getElementById('dTxt').value=it.text;mkSw('itemColors',dIC,c=>{dIC=c;});renderAttach();document.getElementById('detailModal').classList.add('on');}
function closeDetailModal(){document.getElementById('detailModal').classList.remove('on');}
function saveDetail(){const n=notes.find(x=>x.id===dNoteId);if(!n)return;const t=document.getElementById('dTxt').value.trim();if(t)n.items[dIdx].text=t;n.items[dIdx].color=dIC;n.items[dIdx].attachments=dAttach;sv();renderNotes();closeDetailModal();}
function handleFiles(e){Array.from(e.target.files).forEach(f=>{if(f.size>5000000){showToast('File too large (max 5MB)');return;}const r=new FileReader();r.onload=ev=>{dAttach.push({name:f.name,type:f.type,dataUrl:ev.target.result});renderAttach();showToast('✓ '+f.name);};r.readAsDataURL(f);});e.target.value='';}
function renderAttach(){document.getElementById('attachGrid').innerHTML=dAttach.map((a,i)=>{if(a.type.startsWith('image/'))return `<div class="ath" style="cursor:pointer" onclick="previewImg('${a.dataUrl}')"><img src="${a.dataUrl}"><div class="rm" onclick="event.stopPropagation();rmA(${i})">✕</div></div>`;return `<div class="ath"><span style="font-size:24px">📎</span><div class="rm" onclick="event.stopPropagation();rmA(${i})">✕</div></div>`;}).join('');}
function previewImg(dataUrl){document.getElementById('imgPreview').src=dataUrl;document.getElementById('imgModal').classList.add('on');}
function rmA(i){dAttach.splice(i,1);renderAttach();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2500);}

load();initCal();renderFR();renderTS();renderNotes();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(err=>{console.log('Service worker registration failed:',err);});}
</script>
</body>
</html>
